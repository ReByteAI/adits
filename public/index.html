  <script>
    // If the visitor already has a Clerk session — OR is mid-handshake
    // after signing in — skip the landing page and go straight to the
    // app. Clerk exposes __client_uat as a non-HttpOnly cookie: "0"
    // when signed out, a unix timestamp when signed in. A
    // ?__clerk_handshake=... query param is Clerk's post-sign-in
    // bounceback carrying the session cookies inside a JWT; only the
    // Clerk SDK (loaded in app.html, not here) can decode it, so we
    // must forward the param intact to /projects. Running this inline
    // in <head> avoids a flash of the landing page. Visitors can
    // bypass with ?stay=1 (useful for sharing the landing URL while
    // logged in).
    (function () {
      try {
        var params = new URLSearchParams(location.search);
        if (params.has('stay')) return;
        if (params.has('__clerk_handshake')) {
          location.replace('/projects' + location.search + location.hash);
          return;
        }
        var uat = document.cookie.split('; ').find(function (c) {
          return c.indexOf('__client_uat=') === 0;
        });
        if (uat && uat.slice('__client_uat='.length) !== '0') {
          location.replace('/projects');
        }
      } catch (e) { /* cookie parse errors never block the landing page */ }
    })();
  </script>
